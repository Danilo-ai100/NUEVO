server:
  port: 8082

spring:
  application:
    name: ms-gateway-client
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: ms-catalogo
          uri: lb://ms-catalogo
          predicates:
            - Path=/producto/**
          # filters:
          #   - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8090/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: localhost
